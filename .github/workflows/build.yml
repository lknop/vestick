name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.flavor }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: debian
            proxmox: 0
          - flavor: pve
            proxmox: 1
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap squashfs-tools gdisk grub-efi-amd64-bin \
            dosfstools f2fs-tools rsync wget

      - name: Free disk space
        # PVE build needs ~5 GB scratch (chroot + squashfs + image). Default
        # ubuntu-24.04 runner has ~14 GB free; nuking preinstalled language
        # toolchains we don't use frees another ~10–15 GB of headroom.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Build image
        env:
          INCLUDE_PROXMOX: ${{ matrix.proxmox }}
        run: |
          sudo -E ./build.sh
          # Build runs under sudo so out/ is root-owned; subsequent steps
          # (mv/sha256sum/upload-artifact) run as the runner user. Hand
          # ownership back so they don't need sudo.
          sudo chown -R "$(id -u):$(id -g)" out/

      - name: Stage artifacts
        run: |
          mv out/vestick.img vestick-${{ matrix.flavor }}.img
          sha256sum vestick-${{ matrix.flavor }}.img \
            > vestick-${{ matrix.flavor }}.img.sha256
          ls -lh vestick-${{ matrix.flavor }}.img*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vestick-${{ matrix.flavor }}
          path: |
            vestick-${{ matrix.flavor }}.img
            vestick-${{ matrix.flavor }}.img.sha256
          retention-days: 14
          if-no-files-found: error

  release:
    name: attach images to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release if missing, then upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            artifacts/vestick-*.img \
            artifacts/vestick-*.img.sha256
