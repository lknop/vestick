# /var/lib/vz is on tmpfs (see build.sh write_fstab) — recreate the
# subdirs Proxmox tools expect on every boot. Without these, pvestatd's
# scan races to mkdir them ("/var/lib/vz/dump: ... at PVE/Storage/
# Plugin.pm line 1919") and on a freshly-mounted empty tmpfs that
# happens to succeed but logs noisily; tmpfiles.d-setup runs first so
# the mkdir is idempotent and quiet.
d /var/lib/vz/dump            0755 root root -
d /var/lib/vz/images          0755 root root -
d /var/lib/vz/template        0755 root root -
d /var/lib/vz/template/cache  0755 root root -
d /var/lib/vz/template/iso    0755 root root -
d /var/lib/vz/private         0755 root root -
d /var/lib/vz/snippets        0755 root root -
