# /var/lib/rrdcached is on tmpfs (see build.sh write_fstab) so its layout
# resets every boot. The shipped image only has empty db/ and journal/
# dirs and those vanish under the tmpfs mount; pmxcfs's first status tick
# then logs "RRD create error /var/lib/rrdcached/db/pve-{node,storage}-
# 9.0/...: Cannot create temporary file" until rrdcached lazily mkdir-s
# the parent. tmpfiles.d-setup runs ahead of pmxcfs, so we just pre-seed
# the directories Proxmox 9.x's RRD layout expects.
#
# %H expands to the hostname — pve-storage-* RRDs are nested per-host.
# If the hostname changes between boots (firstboot wizard) the next boot
# creates a fresh subdir; the old one is gone with the tmpfs.
d /var/lib/rrdcached/db                       0755 root root -
d /var/lib/rrdcached/journal                  0755 root root -
d /var/lib/rrdcached/db/pve-node-9.0          0755 root root -
d /var/lib/rrdcached/db/pve-storage-9.0       0755 root root -
d /var/lib/rrdcached/db/pve-storage-9.0/%H    0755 root root -
d /var/lib/rrdcached/db/pve-vm-9.0            0755 root root -
d /var/lib/rrdcached/db/pve-ct-9.0            0755 root root -
