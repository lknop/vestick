# /var/log is on tmpfs (see /etc/fstab) — pveproxy and spiceproxy need
# /var/log/pveproxy to exist before they start; without it, workers exit
# immediately with "unable to open log file '/var/log/pveproxy/access.log'
# - No such file or directory" and the web UI returns no response.
# www-data:www-data is what pveproxy.service runs as.
d /var/log/pveproxy 0755 www-data www-data -
