# /var/lib/vz is on tmpfs (see /etc/fstab) — recreate the subdirs Proxmox
# tools expect on every boot. Without these, pvestatd's scan races to
# mkdir them and on a freshly-mounted empty tmpfs the mkdir succeeds but
# logs noisily; tmpfiles.d-setup runs first so the mkdir is idempotent.
d /var/lib/vz/dump            0755 root root -
d /var/lib/vz/images          0755 root root -
d /var/lib/vz/template        0755 root root -
d /var/lib/vz/template/cache  0755 root root -
d /var/lib/vz/template/iso    0755 root root -
d /var/lib/vz/private         0755 root root -
d /var/lib/vz/snippets        0755 root root -
