# VEstick overlayroot configuration.
# device:dev=LABEL=overlay,fstype=f2fs,mkfs=1
#   - upper layer is a persistent f2fs partition labeled "overlay"
#   - mkfs=1 lets the initramfs hook format the partition on first boot
# Volatile paths (logs, caches, rrdcached, etc.) are tmpfs-mounted via
# /etc/fstab on top of the overlay; see docs/architecture.md.
overlayroot="device:dev=LABEL=overlay,fstype=f2fs,mkfs=1"
overlayroot_cfgdisk="disabled"
