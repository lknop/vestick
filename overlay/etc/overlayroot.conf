# VEstick overlayroot configuration.
# device:dev=LABEL=overlay
#   - upper layer is the f2fs partition labeled "overlay"
#   - the partition is formatted at build time (build.sh::build_image runs
#     mkfs.f2fs -l overlay); overlayroot's device mode just mounts what it
#     finds — it does NOT mkfs at runtime (fstype=/mkfs= are crypt:-mode
#     options, not device:-mode)
# Volatile paths (logs, caches, rrdcached, etc.) are tmpfs-mounted via
# /etc/fstab on top of the overlay; see docs/architecture.md.
overlayroot="device:dev=LABEL=overlay"
overlayroot_cfgdisk="disabled"
